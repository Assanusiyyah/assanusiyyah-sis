[build]
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  DISABLE_ESLINT_PLUGIN = "true"
  SECRETS_SCAN_OMIT_KEYS = "TERMII_SENDER,SUPABASE_KEY,SUPABASE_URL,AUTH_SECRET"

[[redirects]]
  from = "/api/db"
  to = "/.netlify/functions/db"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200

[[redirects]]
  from = "/api/sms"
  to = "/.netlify/functions/sms"
  status = 200

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/parent-login"
  to = "/.netlify/functions/parent-login"
  status = 200

[[redirects]]
  from = "/api/parent-data"
  to = "/.netlify/functions/parent-data"
  status = 200

[[redirects]]
  from = "/api/exam"
  to = "/.netlify/functions/exam-attempt"
  status = 200

[[redirects]]
  from = "/api/parent-assignment"
  to = "/.netlify/functions/parent-assignment"
  status = 200

[[redirects]]
  from = "/api/candidate"
  to = "/.netlify/functions/candidate-portal"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
