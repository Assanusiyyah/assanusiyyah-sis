<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#230E6A" />
    <meta name="description" content="Assanusiyyah Group of Schools — School Information System" />
    <title>Assanusiyyah SIS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d0825; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; }
      #loading .ring { width: 60px; height: 60px; border: 4px solid rgba(240,192,96,0.2); border-top-color: #F0C060; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
      #loading h2 { color: #F0C060; font-size: 18px; margin-bottom: 6px; }
      #loading p { color: rgba(255,255,255,0.5); font-size: 13px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="ring"></div>
        <h2>Assanusiyyah Group of Schools</h2>
        <p>Loading School Information System...</p>
      </div>
    </div>
  </body>
</html>
